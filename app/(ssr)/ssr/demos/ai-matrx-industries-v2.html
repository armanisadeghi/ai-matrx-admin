<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI MATRX — Industry Editions v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #050505;
    color: #f5f3ee;
    font-family: 'JetBrains Mono', monospace;
    overflow-x: hidden;
  }
  .stage {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border-bottom: 1px solid #151515;
    overflow: hidden;
    cursor: pointer;
  }
  .label {
    position: absolute;
    top: 24px;
    left: 24px;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #6b6b6b;
    text-transform: uppercase;
    z-index: 20;
  }
  .replay {
    position: absolute;
    top: 24px;
    right: 24px;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #6b6b6b;
    text-transform: uppercase;
    z-index: 20;
  }
  .stage:hover .replay { color: #f5f3ee; }
  svg { width: min(94vw, 1300px); height: auto; }

  /* Lockup text: industry word above, MATRX below at fixed large size */
  .industry-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-anchor: middle;
  }
  .matrx-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-anchor: middle;
    font-size: 140px;
  }

  /* Two-pass rendering: stroke version draws on, then fill fades in */
  .text-stroke {
    fill: none;
    stroke-width: 1.5;
    paint-order: stroke;
  }
  .text-fill {
    stroke: none;
    opacity: 0;
  }
  .glow-text {
    fill: none;
    stroke-width: 6;
    filter: blur(6px);
    opacity: 0;
  }

  .frame {
    fill: none;
    stroke-width: 1;
    opacity: 0;
  }
  .sub-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    opacity: 0;
    text-transform: uppercase;
    text-anchor: middle;
  }
  .ai-marker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.4em;
    opacity: 0;
    text-anchor: middle;
  }
  .motif {
    fill: none;
    stroke-width: 1.2;
    opacity: 0;
  }
  .divider {
    stroke-width: 1;
    opacity: 0;
  }

  /* ============ LEGAL ============ */
  #legal { background: linear-gradient(135deg, #0a0a14 0%, #050505 50%, #14100a 100%); }
  #legal .frame { stroke: rgba(196, 162, 105, 0.3); }
  #legal .sub-text { fill: #c4a269; }
  #legal .ai-marker { fill: #c4a269; }
  #legal .motif { stroke: rgba(196, 162, 105, 0.5); }
  #legal .divider { stroke: rgba(196, 162, 105, 0.4); }
  #legal .particles circle { fill: #c4a269; }

  /* ============ MEDICAL ============ */
  #medical { background: linear-gradient(135deg, #0a1418 0%, #050a0c 50%, #0a1820 100%); }
  #medical .frame { stroke: rgba(120, 200, 220, 0.3); }
  #medical .sub-text { fill: #78c8dc; }
  #medical .ai-marker { fill: #78c8dc; }
  #medical .motif { stroke: rgba(120, 200, 220, 0.6); }
  #medical .divider { stroke: rgba(120, 200, 220, 0.4); }
  #medical .particles circle { fill: #78c8dc; }

  /* ============ FINANCE ============ */
  #finance { background: linear-gradient(135deg, #0a140e 0%, #050a07 50%, #0c1810 100%); }
  #finance .frame { stroke: rgba(110, 200, 140, 0.3); }
  #finance .sub-text { fill: #6ec88c; }
  #finance .ai-marker { fill: #6ec88c; }
  #finance .motif { stroke: rgba(110, 200, 140, 0.5); }
  #finance .divider { stroke: rgba(110, 200, 140, 0.4); }
  #finance .particles circle { fill: #6ec88c; }

  /* ============ E-COMMERCE ============ */
  #ecommerce { background: linear-gradient(135deg, #18080a 0%, #0a0405 50%, #1a0a14 100%); }
  #ecommerce .frame { stroke: rgba(220, 100, 130, 0.3); }
  #ecommerce .sub-text { fill: #dc6482; }
  #ecommerce .ai-marker { fill: #dc6482; }
  #ecommerce .motif { stroke: rgba(220, 100, 130, 0.5); }
  #ecommerce .divider { stroke: rgba(220, 100, 130, 0.4); }
  #ecommerce .particles circle { fill: #dc6482; }

  /* ============ MARKETING ============ */
  #marketing { background: linear-gradient(135deg, #1a0a18 0%, #0a0508 50%, #14081c 100%); }
  #marketing .frame { stroke: rgba(200, 130, 220, 0.3); }
  #marketing .sub-text { fill: #c882dc; }
  #marketing .ai-marker { fill: #c882dc; }
  #marketing .motif { stroke: rgba(200, 130, 220, 0.5); }
  #marketing .divider { stroke: rgba(200, 130, 220, 0.4); }
  #marketing .particles circle { fill: #c882dc; }

  /* ============ SEO ============ */
  #seo { background: linear-gradient(135deg, #0c0a18 0%, #050410 50%, #08081c 100%); }
  #seo .frame { stroke: rgba(130, 160, 240, 0.3); }
  #seo .sub-text { fill: #82a0f0; }
  #seo .ai-marker { fill: #82a0f0; }
  #seo .motif { stroke: rgba(130, 160, 240, 0.5); }
  #seo .divider { stroke: rgba(130, 160, 240, 0.4); }
  #seo .particles circle { fill: #82a0f0; }

  /* ============ EDUCATION ============ */
  #education { background: linear-gradient(135deg, #18120a 0%, #0a0805 50%, #1c1408 100%); }
  #education .frame { stroke: rgba(240, 180, 100, 0.3); }
  #education .sub-text { fill: #f0b464; }
  #education .ai-marker { fill: #f0b464; }
  #education .motif { stroke: rgba(240, 180, 100, 0.5); }
  #education .divider { stroke: rgba(240, 180, 100, 0.4); }
  #education .particles circle { fill: #f0b464; }

  /* ============ CODE ============ */
  #code { background: linear-gradient(135deg, #0a1414 0%, #050a0a 50%, #0a1818 100%); }
  #code .frame { stroke: rgba(100, 220, 200, 0.3); }
  #code .sub-text { fill: #64dcc8; }
  #code .ai-marker { fill: #64dcc8; }
  #code .motif { stroke: rgba(100, 220, 200, 0.5); }
  #code .divider { stroke: rgba(100, 220, 200, 0.4); }
  #code .particles circle { fill: #64dcc8; }
</style>
</head>
<body>

<!-- Each section uses the same lockup pattern:
     - "AI" marker at top (small, mono)
     - Industry word (large, scales to fit)
     - thin horizontal divider line
     - "MATRX" (largest, fixed size, the brand anchor)
     - tagline below
     - frame around the whole composition
     - industry-specific motif element
     - drifting particles
-->

<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<script>
function prepText(el) {
  // For SVG <text>, we can't use getTotalLength directly the way we do with paths.
  // Instead we use the stroke-dasharray trick with a large value to simulate draw-on.
  const length = 2000; // long enough to cover any text
  el.style.strokeDasharray = length;
  el.style.strokeDashoffset = length;
}

function buildParticles(containerId, count, bounds) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', bounds.x + Math.random() * bounds.w);
    circle.setAttribute('cy', bounds.y + Math.random() * bounds.h);
    circle.setAttribute('r', 0.5 + Math.random() * 1.5);
    c.appendChild(circle);
  }
}

function playStage(stageId) {
  const stage = document.getElementById(stageId);
  const frame = stage.querySelector('.frame');
  const aiMarker = stage.querySelector('.ai-marker');
  const divider = stage.querySelector('.divider');
  const sub = stage.querySelector('.sub-text');

  const industryStroke = document.getElementById(stageId + '-industry-stroke');
  const industryFill = document.getElementById(stageId + '-industry-fill');
  const industryGlow = document.getElementById(stageId + '-industry-glow');
  const matrxStroke = document.getElementById(stageId + '-matrx-stroke');
  const matrxFill = document.getElementById(stageId + '-matrx-fill');
  const matrxGlow = document.getElementById(stageId + '-matrx-glow');

  const motifEls = stage.querySelectorAll('.motif path, .motif line, .motif circle, .motif rect');

  // Clean previous animations
  anime.remove([frame, aiMarker, divider, sub, industryStroke, industryFill, industryGlow, matrxStroke, matrxFill, matrxGlow]);
  anime.remove(motifEls);

  // Build/reset particles
  buildParticles(stageId + '-particles', 50, { x: 100, y: 80, w: 1000, h: 320 });
  const particles = stage.querySelectorAll('#' + stageId + '-particles circle');

  // Prep stroke draw-on for the four stroke-versions
  prepText(industryStroke);
  prepText(industryGlow);
  prepText(matrxStroke);
  prepText(matrxGlow);

  // Initial states
  anime.set(frame, { opacity: 0 });
  anime.set(aiMarker, { opacity: 0 });
  anime.set(divider, { opacity: 0, scaleX: 0 });
  anime.set(sub, { opacity: 0 });
  anime.set(industryFill, { opacity: 0 });
  anime.set(industryGlow, { opacity: 0 });
  anime.set(matrxFill, { opacity: 0 });
  anime.set(matrxGlow, { opacity: 0 });
  anime.set(particles, { opacity: 0 });
  anime.set(motifEls, { opacity: 0 });

  const tl = anime.timeline();

  tl.add({
    targets: frame,
    opacity: [0, 1],
    duration: 700,
    easing: 'easeOutQuad'
  })
  .add({
    targets: aiMarker,
    opacity: [0, 0.7],
    duration: 500
  }, '-=300')
  // Industry word: glow appears, then strokes draw on
  .add({
    targets: industryGlow,
    opacity: [0, 0.6],
    strokeDashoffset: [2000, 0],
    duration: 1400,
    easing: 'easeInOutQuart'
  }, '-=200')
  .add({
    targets: industryStroke,
    strokeDashoffset: [2000, 0],
    duration: 1400,
    easing: 'easeInOutQuart'
  }, '-=1400')
  .add({
    targets: industryFill,
    opacity: [0, 1],
    duration: 600,
    easing: 'easeOutQuad'
  }, '-=400')
  // Divider draws across
  .add({
    targets: divider,
    opacity: [0, 1],
    scaleX: [0, 1],
    duration: 600,
    easing: 'easeOutQuad'
  }, '-=300')
  // MATRX: glow + strokes + fill
  .add({
    targets: matrxGlow,
    opacity: [0, 0.6],
    strokeDashoffset: [2000, 0],
    duration: 1800,
    easing: 'easeInOutQuart'
  }, '-=200')
  .add({
    targets: matrxStroke,
    strokeDashoffset: [2000, 0],
    duration: 1800,
    easing: 'easeInOutQuart'
  }, '-=1800')
  .add({
    targets: matrxFill,
    opacity: [0, 1],
    duration: 700,
    easing: 'easeOutQuad'
  }, '-=500')
  // Particles drift in
  .add({
    targets: particles,
    opacity: [{ value: [0, 0.7], duration: 400 }, { value: 0.3, duration: 600 }],
    translateY: () => anime.random(-25, 25),
    translateX: () => anime.random(-18, 18),
    duration: 1000,
    delay: anime.stagger(15, { from: 'center' })
  }, '-=1200')
  // Motif emerges
  .add({
    targets: motifEls,
    opacity: [0, 0.7],
    duration: 800,
    delay: anime.stagger(40),
    easing: 'easeOutQuad'
  }, '-=600')
  // Tagline
  .add({
    targets: sub,
    opacity: [0, 1],
    duration: 700
  }, '-=400');

  // Looping particles
  setTimeout(() => {
    anime({
      targets: particles,
      translateY: () => '+=' + anime.random(-12, 12),
      translateX: () => '+=' + anime.random(-12, 12),
      opacity: [0.3, 0.65, 0.3],
      duration: () => anime.random(2200, 4500),
      easing: 'easeInOutSine',
      loop: true,
      direction: 'alternate'
    });
  }, 4500);

  // Set divider transform-origin so scaleX animates from center
  if (divider) {
    divider.style.transformOrigin = '600px 240px';
    divider.style.transformBox = 'fill-box';
  }

  // Medical-specific pulse loop
  if (stageId === 'medical') {
    const pulse = document.getElementById('medical-pulse');
    if (pulse) {
      const len = pulse.getTotalLength();
      setTimeout(() => {
        pulse.style.strokeDasharray = '50 ' + (len - 50);
        anime({
          targets: pulse,
          strokeDashoffset: [-len, 0],
          duration: 2400,
          easing: 'linear',
          loop: true
        });
      }, 5000);
    }
  }
}

const stages = ['legal', 'medical', 'finance', 'ecommerce', 'marketing', 'seo', 'education', 'code'];

stages.forEach(id => {
  document.getElementById(id).addEventListener('click', () => playStage(id));
});

const io = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting && !entry.target.dataset.played) {
      entry.target.dataset.played = '1';
      playStage(entry.target.id);
    }
  });
}, { threshold: 0.35 });

document.querySelectorAll('.stage').forEach(s => io.observe(s));
</script>
