<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI MATRX — Vector Construct Studies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --ink: #f5f3ee;
    --accent: #ff3d00;
    --cyan: #00d4ff;
    --gold: #d4a574;
    --muted: #6b6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    overflow-x: hidden;
  }
  .stage {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border-bottom: 1px solid #1a1a1a;
    overflow: hidden;
    cursor: pointer;
  }
  .label {
    position: absolute;
    top: 24px;
    left: 24px;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    z-index: 20;
  }
  .replay {
    position: absolute;
    top: 24px;
    right: 24px;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    z-index: 20;
  }
  .stage:hover .replay { color: var(--ink); }
  svg { width: min(92vw, 1200px); height: auto; }

  /* shared letter path styles - overridden per stage */
  .letters path {
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ============ V1: BLUEPRINT (refined original) ============ */
  #v1 .grid line { stroke: #1a1a1a; stroke-width: 1; }
  #v1 .grid-major line { stroke: #2a2a2a; stroke-width: 1; }
  #v1 .letters path { stroke: var(--ink); }
  #v1 .crosshair line { stroke: var(--accent); stroke-width: 1; opacity: 0; }
  #v1 .corner { stroke: var(--cyan); stroke-width: 1.5; fill: none; opacity: 0; }
  #v1 .meta-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    fill: var(--muted);
    letter-spacing: 2px;
    opacity: 0;
  }
  #v1 .dim-line { stroke: var(--cyan); stroke-width: 1; opacity: 0; }
  #v1 .dim-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    fill: var(--cyan);
    letter-spacing: 1px;
    opacity: 0;
  }

  /* ============ V2: NEON WIREFRAME ============ */
  #v2 { background: radial-gradient(ellipse at center, #0a0515 0%, #02000a 70%); }
  #v2 .letters path {
    stroke: var(--cyan);
    stroke-width: 2.5;
    filter: drop-shadow(0 0 8px var(--cyan)) drop-shadow(0 0 20px rgba(0,212,255,0.5));
  }
  #v2 .ghost path {
    fill: none;
    stroke: rgba(255, 0, 200, 0.6);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 12px rgba(255, 0, 200, 0.7));
  }
  #v2 .pulse-ring {
    fill: none;
    stroke: var(--cyan);
    stroke-width: 1;
    opacity: 0;
  }

  /* ============ V3: ARCHITECT'S DRAFT ============ */
  #v3 { background: #f5f3ee; }
  #v3 .letters path { stroke: #1a1a1a; stroke-width: 2.5; }
  #v3 .grid line { stroke: #d4cfc4; stroke-width: 0.5; }
  #v3 .grid-major line { stroke: #b8b0a0; stroke-width: 0.8; }
  #v3 .construction { stroke: #c44536; stroke-width: 0.8; opacity: 0; stroke-dasharray: 4 3; }
  #v3 .annotation {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    fill: #c44536;
    letter-spacing: 1px;
    opacity: 0;
  }
  #v3 .stamp {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    fill: #1a1a1a;
    letter-spacing: 3px;
    opacity: 0;
  }
  #v3 .label { color: #888; }
  #v3 .replay { color: #888; }
  #v3:hover .replay { color: #1a1a1a; }
  #v3 .border-rect { stroke: #1a1a1a; stroke-width: 1; fill: none; opacity: 0; }

  /* ============ V4: CIRCUIT TRACE ============ */
  #v4 { background: #050a08; }
  #v4 .letters path {
    stroke: #00ff88;
    stroke-width: 2.5;
    filter: drop-shadow(0 0 6px #00ff88);
  }
  #v4 .node {
    fill: #00ff88;
    filter: drop-shadow(0 0 4px #00ff88);
    opacity: 0;
  }
  #v4 .trace {
    stroke: #00ff88;
    stroke-width: 1;
    opacity: 0.3;
    fill: none;
  }
  #v4 .pcb-grid line {
    stroke: #0a3d2a;
    stroke-width: 0.5;
  }
  #v4 .data-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    fill: #00ff88;
    opacity: 0;
    letter-spacing: 1px;
  }

  /* ============ V5: TYPOGRAPHIC CONSTRUCTION ============ */
  #v5 { background: #fafaf7; }
  #v5 .letters path { stroke: #0a0a0b; stroke-width: 4; }
  #v5 .baseline { stroke: var(--accent); stroke-width: 1; opacity: 0; }
  #v5 .x-height { stroke: var(--accent); stroke-width: 1; stroke-dasharray: 3 3; opacity: 0; }
  #v5 .cap-height { stroke: var(--accent); stroke-width: 1; stroke-dasharray: 3 3; opacity: 0; }
  #v5 .guide-text {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    fill: var(--accent);
    letter-spacing: 1px;
    opacity: 0;
    text-transform: uppercase;
  }
  #v5 .point {
    fill: var(--accent);
    opacity: 0;
  }
  #v5 .label { color: #999; }
  #v5 .replay { color: #999; }
  #v5:hover .replay { color: #0a0a0b; }

  /* ============ V6: GLASS & LIGHT ============ */
  #v6 {
    background: linear-gradient(135deg, #1a0a2e 0%, #0a0a0b 50%, #002030 100%);
  }
  #v6 .letters path {
    stroke: url(#gradient-stroke);
    stroke-width: 3;
  }
  #v6 .glow path {
    fill: none;
    stroke: rgba(212, 165, 116, 0.4);
    stroke-width: 8;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: blur(6px);
  }
  #v6 .particles circle { fill: var(--gold); opacity: 0; }
  #v6 .frame {
    fill: none;
    stroke: rgba(212, 165, 116, 0.3);
    stroke-width: 1;
    opacity: 0;
  }
  #v6 .sub-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    fill: var(--gold);
    letter-spacing: 4px;
    opacity: 0;
  }
</style>
</head>

<script>
// Helper: build grid lines into an svg group
function buildGrid(groupId, w, h, step, vbW, vbH) {
  const g = document.getElementById(groupId);
  if (g.children.length) return;
  for (let x = 0; x <= vbW; x += step) {
    const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l.setAttribute('x1', x); l.setAttribute('y1', 0);
    l.setAttribute('x2', x); l.setAttribute('y2', vbH);
    g.appendChild(l);
  }
  for (let y = 0; y <= vbH; y += step) {
    const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l.setAttribute('x1', 0); l.setAttribute('y1', y);
    l.setAttribute('x2', vbW); l.setAttribute('y2', y);
    g.appendChild(l);
  }
}

// Helper: prep paths for draw-on
function prepPaths(selector) {
  document.querySelectorAll(selector).forEach(p => {
    const len = p.getTotalLength();
    p.style.strokeDasharray = len;
    p.style.strokeDashoffset = len;
  });
}

// ============ V1: BLUEPRINT ============
function playV1() {
  buildGrid('v1-grid', 1200, 320, 25);
  buildGrid('v1-grid-major', 1200, 320, 100);

  const minorLines = document.querySelectorAll('#v1-grid line');
  const majorLines = document.querySelectorAll('#v1-grid-major line');
  const paths = document.querySelectorAll('#v1-letters path');

  anime.remove(minorLines); anime.remove(majorLines); anime.remove(paths);
  anime.remove('#v1 .corner, #v1 .crosshair line, #v1 .meta-text, #v1 .dim-line, #v1 .dim-text');

  prepPaths('#v1-letters path');
  anime.set(minorLines, { opacity: 0 });
  anime.set(majorLines, { opacity: 0 });
  anime.set('#v1 .corner', { opacity: 0, scale: 1.5 });

  anime.timeline()
    .add({
      targets: minorLines,
      opacity: [0, 0.4],
      duration: 600,
      delay: anime.stagger(4),
      easing: 'easeOutQuad'
    })
    .add({
      targets: majorLines,
      opacity: [0, 0.7],
      duration: 400
    }, '-=400')
    .add({
      targets: '#v1 .corner',
      opacity: [0, 1],
      scale: [1.5, 1],
      duration: 500,
      delay: anime.stagger(80),
      easing: 'easeOutBack'
    }, '-=400')
    .add({
      targets: '#v1 .crosshair line',
      opacity: [0, 0.3, 0.15],
      duration: 600
    }, '-=300')
    .add({
      targets: paths,
      strokeDashoffset: [anime.setDashoffset, 0],
      duration: 1400,
      delay: anime.stagger(100),
      easing: 'easeInOutCubic'
    }, '-=200')
    .add({
      targets: minorLines,
      opacity: [0.4, 0.15],
      duration: 500
    }, '-=800')
    .add({
      targets: '#v1 .dim-line',
      opacity: [0, 0.6],
      duration: 400
    }, '-=200')
    .add({

      opacity: [0, 1],
      duration: 400,
      delay: anime.stagger(60)
    }, '-=200');
}

      targets: ghostPaths,
      strokeDashoffset: [anime.setDashoffset, 0],

// ============ V4: CIRCUIT TRACE ============
function playV4() {
  buildGrid('v4-grid', 1200, 320, 20);

  const gridLines = document.querySelectorAll('#v4-grid line');
  const traces = document.querySelectorAll('#v4-traces .trace');
  const paths = document.querySelectorAll('#v4-letters path');
  const nodes = document.querySelectorAll('#v4-nodes .node');

  anime.remove(gridLines); anime.remove(traces); anime.remove(paths); anime.remove(nodes);
  anime.remove('#v4 .data-text');

  prepPaths('#v4-letters path');
  prepPaths('#v4-traces .trace');
  anime.set(gridLines, { opacity: 0 });
  anime.set(nodes, { opacity: 0, scale: 0 });

  anime.timeline()
    .add({
      targets: gridLines,
      opacity: [0, 1],
      duration: 400,
      delay: anime.stagger(2)
    })
    .add({
      targets: traces,
      strokeDashoffset: [anime.setDashoffset, 0],
      duration: 800,
      delay: anime.stagger(60),
      easing: 'easeOutQuad'
    }, '-=300')
    .add({
      targets: paths,
      strokeDashoffset: [anime.setDashoffset, 0],
      duration: 1400,
      delay: anime.stagger(90),
      easing: 'easeInOutQuart'
    }, '-=400')
    .add({
      targets: nodes,
      opacity: [0, 1],
      scale: [0, 1.4, 1],
      duration: 500,
      delay: anime.stagger(20),
      easing: 'easeOutBack'
    }, '-=600')
    .add({
      targets: '#v4 .data-text',
      opacity: [0, 1],
      duration: 400,
      delay: anime.stagger(80)
    }, '-=300');

  // Pulse loop on nodes
  setTimeout(() => {
    anime({
      targets: nodes,
      opacity: [1, 0.5, 1],
      duration: 1800,
      delay: anime.stagger(50, { from: 'random' }),
      easing: 'easeInOutSine',
      loop: true
    });
  }, 3500);
}

    .add({

    }, '-=400')

    }, '-=300')
    .add({

      strokeDashoffset: [anime.setDashoffset, 0],

      delay: anime.stagger(120),

// ============ V6: GLASS & LIGHT ============
function playV6() {
  // Build particles
  const particles = document.getElementById('v6-particles');
  particles.innerHTML = '';
  const particleCount = 40;
  for (let i = 0; i < particleCount; i++) {
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', 100 + Math.random() * 1000);
    c.setAttribute('cy', 80 + Math.random() * 160);
    c.setAttribute('r', 0.5 + Math.random() * 1.5);
    particles.appendChild(c);
  }

  const paths = document.querySelectorAll('#v6-letters path');
  const glowPaths = document.querySelectorAll('#v6-glow path');
  const particleEls = document.querySelectorAll('#v6-particles circle');

  anime.remove(paths); anime.remove(glowPaths); anime.remove(particleEls);
  anime.remove('#v6-frame, #v6-sub');

  prepPaths('#v6-letters path');
  prepPaths('#v6-glow path');
  anime.set('#v6-frame', { opacity: 0 });
  anime.set(particleEls, { opacity: 0 });

  anime.timeline()
    .add({
      targets: '#v6-frame',
      opacity: [0, 1],
      duration: 800,
      easing: 'easeOutQuad'
    })
    .add({
      targets: glowPaths,
      strokeDashoffset: [anime.setDashoffset, 0],
      duration: 2000,
      delay: anime.stagger(100),
      easing: 'easeInOutQuart'
    }, '-=400')
    .add({
      targets: paths,
      strokeDashoffset: [anime.setDashoffset, 0],
      duration: 2000,
      delay: anime.stagger(100),
      easing: 'easeInOutQuart'
    }, '-=2000')
    .add({
      targets: particleEls,
      opacity: [{ value: [0, 0.8], duration: 400 }, { value: 0.3, duration: 600 }],
      translateY: () => anime.random(-30, 30),
      translateX: () => anime.random(-20, 20),
      duration: 1000,
      delay: anime.stagger(20, { from: 'center' })
    }, '-=1200')
    .add({
      targets: '#v6-sub',
      opacity: [0, 1],
      duration: 800
    }, '-=400');

  // Floating particles loop
  setTimeout(() => {
    anime({
      targets: particleEls,
      translateY: () => '+=' + anime.random(-15, 15),
      translateX: () => '+=' + anime.random(-15, 15),
      opacity: [0.3, 0.7, 0.3],
      duration: () => anime.random(2000, 4000),
      easing: 'easeInOutSine',
      loop: true,
      direction: 'alternate'
    });
  }, 3500);
}

// Wire it all up
const handlers = { v1: playV1, v2: playV2, v3: playV3, v4: playV4, v5: playV5, v6: playV6 };
Object.keys(handlers).forEach(id => {
  document.getElementById(id).addEventListener('click', handlers[id]);
});

// Auto-play on scroll into view
const io = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting && !entry.target.dataset.played) {
      entry.target.dataset.played = '1';
      handlers[entry.target.id]?.();
    }
  });
}, { threshold: 0.4 });

document.querySelectorAll('.stage').forEach(s => io.observe(s));
</script>
