<style>
  @keyframes flow-down { 0% { stroke-dashoffset: 24; } 100% { stroke-dashoffset: 0; } }
  @keyframes packet-1 { 0%, 100% { opacity: 0; } 8%, 18% { opacity: 1; } }
  @keyframes packet-2 { 0%, 100% { opacity: 0; } 18%, 28% { opacity: 1; } }
  @keyframes packet-3 { 0%, 100% { opacity: 0; } 28%, 38% { opacity: 1; } }
  @keyframes packet-4 { 0%, 100% { opacity: 0; } 38%, 48% { opacity: 1; } }
  @keyframes packet-5 { 0%, 100% { opacity: 0; } 48%, 58% { opacity: 1; } }
  @keyframes packet-6 { 0%, 100% { opacity: 0; } 58%, 68% { opacity: 1; } }
  @keyframes stage-pulse-1 { 0%, 100% { opacity: 0.4; } 8%, 18% { opacity: 1; } }
  @keyframes stage-pulse-2 { 0%, 100% { opacity: 0.4; } 18%, 28% { opacity: 1; } }
  @keyframes stage-pulse-3 { 0%, 100% { opacity: 0.4; } 28%, 38% { opacity: 1; } }
  @keyframes stage-pulse-4 { 0%, 100% { opacity: 0.4; } 38%, 48% { opacity: 1; } }
  @keyframes stage-pulse-5 { 0%, 100% { opacity: 0.4; } 48%, 58% { opacity: 1; } }
  @keyframes stage-pulse-6 { 0%, 100% { opacity: 0.4; } 58%, 68% { opacity: 1; } }
  @keyframes store-glow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  @keyframes search-pulse { 0%, 100% { stroke-dashoffset: 0; opacity: 0.3; } 50% { opacity: 1; } 100% { stroke-dashoffset: -16; } }
  @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .flow-line { stroke-dasharray: 4 4; animation: flow-down 1.2s linear infinite; }
  .glow-1 { animation: stage-pulse-1 8s ease-in-out infinite; }
  .glow-2 { animation: stage-pulse-2 8s ease-in-out infinite; }
  .glow-3 { animation: stage-pulse-3 8s ease-in-out infinite; }
  .glow-4 { animation: stage-pulse-4 8s ease-in-out infinite; }
  .glow-5 { animation: stage-pulse-5 8s ease-in-out infinite; }
  .glow-6 { animation: stage-pulse-6 8s ease-in-out infinite; }
  .pkt-1 { animation: packet-1 8s linear infinite; }
  .pkt-2 { animation: packet-2 8s linear infinite; }
  .pkt-3 { animation: packet-3 8s linear infinite; }
  .pkt-4 { animation: packet-4 8s linear infinite; }
  .pkt-5 { animation: packet-5 8s linear infinite; }
  .pkt-6 { animation: packet-6 8s linear infinite; }
  .store-pulse { animation: store-glow 3s ease-in-out infinite; }
  .search-line { stroke-dasharray: 6 4; animation: search-pulse 4s linear infinite; }
  .spin { transform-origin: center; transform-box: fill-box; animation: spin-slow 12s linear infinite; }

  @media (prefers-reduced-motion: reduce) {
    .flow-line, .glow-1, .glow-2, .glow-3, .glow-4, .glow-5, .glow-6,
    .pkt-1, .pkt-2, .pkt-3, .pkt-4, .pkt-5, .pkt-6,
    .store-pulse, .search-line, .spin { animation: none; }
  }
</style>
<svg width="100%" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>RAG ingestion pipeline animation</title>
  <desc>Animated flow showing files moving through upload, extract, clean, chunk, and embed stages into a vector store, then queried by an agent.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Stage 1: User file -->
  <g class="c-gray glow-1">
    <rect x="200" y="20" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="44" text-anchor="middle" dominant-baseline="central">User file</text>
    <text class="ts" x="300" y="62" text-anchor="middle" dominant-baseline="central">Source document</text>
  </g>

  <!-- Arrow + label: upload -->
  <line x1="300" y1="76" x2="300" y2="118" stroke="#888780" stroke-width="1.5" class="flow-line" marker-end="url(#arrow)"/>
  <text class="ts" x="320" y="100" dominant-baseline="central">upload</text>
  <circle cx="300" cy="97" r="3" fill="#534AB7" class="pkt-1"/>

  <!-- Stage 2: Cloud file -->
  <g class="c-blue glow-2">
    <rect x="200" y="124" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="148" text-anchor="middle" dominant-baseline="central">Cloud file</text>
    <text class="ts" x="300" y="166" text-anchor="middle" dominant-baseline="central">S3 + cld_files</text>
  </g>

  <!-- Arrow + label: extract -->
  <line x1="300" y1="180" x2="300" y2="222" stroke="#888780" stroke-width="1.5" class="flow-line" marker-end="url(#arrow)"/>
  <text class="ts" x="320" y="204" dominant-baseline="central">extract</text>
  <circle cx="300" cy="201" r="3" fill="#534AB7" class="pkt-2"/>

  <!-- Stage 3: Raw text -->
  <g class="c-amber glow-3">
    <rect x="200" y="228" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="252" text-anchor="middle" dominant-baseline="central">Raw text</text>
    <text class="ts" x="300" y="270" text-anchor="middle" dominant-baseline="central">Per-page, messy</text>
  </g>

  <!-- Arrow + label: clean -->
  <line x1="300" y1="284" x2="300" y2="326" stroke="#888780" stroke-width="1.5" class="flow-line" marker-end="url(#arrow)"/>
  <text class="ts" x="320" y="308" dominant-baseline="central">clean</text>
  <circle cx="300" cy="305" r="3" fill="#534AB7" class="pkt-3"/>

  <!-- Stage 4: Clean text -->
  <g class="c-teal glow-4">
    <rect x="200" y="332" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="356" text-anchor="middle" dominant-baseline="central">Clean text</text>
    <text class="ts" x="300" y="374" text-anchor="middle" dominant-baseline="central">Normalized</text>
  </g>

  <!-- Arrow + label: chunk -->
  <line x1="300" y1="388" x2="300" y2="430" stroke="#888780" stroke-width="1.5" class="flow-line" marker-end="url(#arrow)"/>
  <text class="ts" x="320" y="412" dominant-baseline="central">chunk</text>
  <circle cx="300" cy="409" r="3" fill="#534AB7" class="pkt-4"/>

  <!-- Stage 5: Chunks -->
  <g class="c-purple glow-5">
    <rect x="200" y="436" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="460" text-anchor="middle" dominant-baseline="central">Chunks</text>
    <text class="ts" x="300" y="478" text-anchor="middle" dominant-baseline="central">Small pieces</text>
  </g>

  <!-- Arrow + label: embed -->
  <line x1="300" y1="492" x2="300" y2="534" stroke="#888780" stroke-width="1.5" class="flow-line" marker-end="url(#arrow)"/>
  <text class="ts" x="320" y="516" dominant-baseline="central">embed</text>
  <circle cx="300" cy="513" r="3" fill="#534AB7" class="pkt-5"/>

  <!-- Stage 6: Embeddings -->
  <g class="c-coral glow-6">
    <rect x="200" y="540" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="564" text-anchor="middle" dominant-baseline="central">Embeddings</text>
    <text class="ts" x="300" y="582" text-anchor="middle" dominant-baseline="central">Vector representations</text>
  </g>

  <!-- Branch from Chunks (right) to Data store -->
  <path d="M 400 464 L 480 464 L 480 632 L 460 632" fill="none" stroke="#888780" stroke-width="1.5" class="flow-line" marker-end="url(#arrow)"/>
  <!-- Branch from Embeddings (right) to Data store -->
  <path d="M 400 568 L 540 568 L 540 632 L 540 632" fill="none" stroke="#888780" stroke-width="1.5"/>
  <line x1="540" y1="600" x2="540" y2="630" stroke="#888780" stroke-width="1.5" class="flow-line" marker-end="url(#arrow)"/>

  <!-- Tagged-by label -->
  <text class="ts" x="496" y="544" dominant-baseline="central">tagged by</text>

  <!-- Data store -->
  <g class="c-green store-pulse">
    <rect x="380" y="618" width="220" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="490" y="642" text-anchor="middle" dominant-baseline="central">Data store</text>
    <text class="ts" x="490" y="660" text-anchor="middle" dominant-baseline="central">Indexed + searchable</text>
  </g>

  <!-- Agent query (left of data store) -->
  <g class="c-pink">
    <rect x="60" y="618" width="180" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="150" y="642" text-anchor="middle" dominant-baseline="central">Agent query</text>
    <text class="ts" x="150" y="660" text-anchor="middle" dominant-baseline="central">Searches the store</text>
  </g>

  <!-- Search arrow from Agent query to Data store -->
  <line x1="240" y1="646" x2="378" y2="646" stroke="#D4537E" stroke-width="1.5" class="search-line" marker-end="url(#arrow)"/>
  <text class="ts" x="309" y="636" text-anchor="middle" dominant-baseline="central">searches</text>
</svg>
