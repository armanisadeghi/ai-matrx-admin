<style>
  @keyframes file-shift { 0% { transform: translateX(0); opacity: 1; } 35% { transform: translateX(180px); opacity: 1; } 45% { transform: translateX(180px); opacity: 0; } 100% { transform: translateX(180px); opacity: 0; } }
  @keyframes byte-fly-1 { 0%, 30% { transform: translateX(0); opacity: 0; } 35% { opacity: 1; } 70% { transform: translateX(280px); opacity: 1; } 80%, 100% { transform: translateX(280px); opacity: 0; } }
  @keyframes byte-fly-2 { 0%, 35% { transform: translateX(0); opacity: 0; } 40% { opacity: 1; } 75% { transform: translateX(280px); opacity: 1; } 85%, 100% { transform: translateX(280px); opacity: 0; } }
  @keyframes byte-fly-3 { 0%, 40% { transform: translateX(0); opacity: 0; } 45% { opacity: 1; } 80% { transform: translateX(280px); opacity: 1; } 90%, 100% { transform: translateX(280px); opacity: 0; } }
  @keyframes byte-fly-4 { 0%, 45% { transform: translateX(0); opacity: 0; } 50% { opacity: 1; } 85% { transform: translateX(280px); opacity: 1; } 95%, 100% { transform: translateX(280px); opacity: 0; } }
  @keyframes cloud-receive { 0%, 70% { opacity: 0.5; } 75%, 90% { opacity: 1; } 100% { opacity: 0.5; } }
  @keyframes progress-fill { 0% { width: 0; } 70% { width: 140px; } 100% { width: 140px; } }

  .file-anim { animation: file-shift 5s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  .byte-1 { animation: byte-fly-1 5s linear infinite; transform-box: fill-box; }
  .byte-2 { animation: byte-fly-2 5s linear infinite; transform-box: fill-box; }
  .byte-3 { animation: byte-fly-3 5s linear infinite; transform-box: fill-box; }
  .byte-4 { animation: byte-fly-4 5s linear infinite; transform-box: fill-box; }
  .cloud-anim { animation: cloud-receive 5s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  .progress-anim { animation: progress-fill 5s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) {
    .file-anim, .byte-1, .byte-2, .byte-3, .byte-4, .cloud-anim, .progress-anim { animation: none; }
  }
</style>
<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Upload step animation</title>
  <desc>A file moves from the user's device, breaks into bytes, streams over the network, and arrives in cloud storage.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Source: User device -->
  <g class="c-gray">
    <rect x="40" y="80" width="160" height="120" rx="10" stroke-width="0.5"/>
    <text class="ts" x="120" y="100" text-anchor="middle" dominant-baseline="central">User device</text>
  </g>

  <!-- File icon (animated) -->
  <g class="file-anim">
    <rect x="92" y="120" width="56" height="68" rx="4" fill="#534AB7" opacity="0.15" stroke="#534AB7" stroke-width="1"/>
    <line x1="100" y1="138" x2="140" y2="138" stroke="#534AB7" stroke-width="1" opacity="0.6"/>
    <line x1="100" y1="148" x2="140" y2="148" stroke="#534AB7" stroke-width="1" opacity="0.6"/>
    <line x1="100" y1="158" x2="135" y2="158" stroke="#534AB7" stroke-width="1" opacity="0.6"/>
    <line x1="100" y1="168" x2="140" y2="168" stroke="#534AB7" stroke-width="1" opacity="0.6"/>
    <line x1="100" y1="178" x2="125" y2="178" stroke="#534AB7" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Network channel (visualization of stream) -->
  <line x1="200" y1="140" x2="480" y2="140" stroke="#888780" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.4"/>

  <!-- Flying byte particles -->
  <g>
    <circle cx="210" cy="135" r="4" fill="#534AB7" class="byte-1"/>
    <circle cx="210" cy="142" r="3" fill="#7F77DD" class="byte-2"/>
    <circle cx="210" cy="148" r="4" fill="#534AB7" class="byte-3"/>
    <circle cx="210" cy="138" r="3" fill="#AFA9EC" class="byte-4"/>
  </g>

  <!-- Progress bar at bottom -->
  <rect x="270" y="220" width="140" height="6" rx="3" fill="#888780" opacity="0.15"/>
  <rect x="270" y="220" height="6" rx="3" fill="#534AB7" class="progress-anim"/>
  <text class="ts" x="340" y="244" text-anchor="middle" dominant-baseline="central">Streaming bytes</text>

  <!-- Destination: Cloud / S3 -->
  <g class="c-blue cloud-anim">
    <rect x="480" y="80" width="160" height="120" rx="10" stroke-width="0.5"/>
    <text class="ts" x="560" y="100" text-anchor="middle" dominant-baseline="central">Cloud storage</text>
    <!-- Cloud silhouette -->
    <path d="M 510 160 Q 500 160 500 150 Q 500 138 514 138 Q 518 124 535 124 Q 552 124 558 138 Q 572 138 572 150 Q 572 160 562 160 Z"
          fill="#185FA5" opacity="0.18" stroke="#185FA5" stroke-width="1"/>
    <text class="ts" x="560" y="180" text-anchor="middle" dominant-baseline="central">S3 + cld_files</text>
  </g>

  <!-- Labels -->
  <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">Step 1: Upload</text>
  <text class="ts" x="340" y="60" text-anchor="middle" dominant-baseline="central">User file → cloud storage</text>
</svg>
