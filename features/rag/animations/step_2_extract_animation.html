<style>
  @keyframes page-flip-1 { 0%, 100% { opacity: 0.3; } 10%, 25% { opacity: 1; } }
  @keyframes page-flip-2 { 0%, 100% { opacity: 0.3; } 30%, 45% { opacity: 1; } }
  @keyframes page-flip-3 { 0%, 100% { opacity: 0.3; } 50%, 65% { opacity: 1; } }
  @keyframes text-emit-1 { 0%, 12% { opacity: 0; transform: translateX(0); } 22% { opacity: 1; transform: translateX(60px); } 35%, 100% { opacity: 0; transform: translateX(180px); } }
  @keyframes text-emit-2 { 0%, 32% { opacity: 0; transform: translateX(0); } 42% { opacity: 1; transform: translateX(60px); } 55%, 100% { opacity: 0; transform: translateX(180px); } }
  @keyframes text-emit-3 { 0%, 52% { opacity: 0; transform: translateX(0); } 62% { opacity: 1; transform: translateX(60px); } 75%, 100% { opacity: 0; transform: translateX(180px); } }
  @keyframes raw-build { 0%, 20% { opacity: 0.2; } 35%, 80% { opacity: 1; } 100% { opacity: 0.2; } }

  .page-1 { animation: page-flip-1 6s ease-in-out infinite; }
  .page-2 { animation: page-flip-2 6s ease-in-out infinite; }
  .page-3 { animation: page-flip-3 6s ease-in-out infinite; }
  .emit-1 { animation: text-emit-1 6s ease-in-out infinite; transform-box: fill-box; }
  .emit-2 { animation: text-emit-2 6s ease-in-out infinite; transform-box: fill-box; }
  .emit-3 { animation: text-emit-3 6s ease-in-out infinite; transform-box: fill-box; }
  .raw-anim { animation: raw-build 6s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }

  @media (prefers-reduced-motion: reduce) {
    .page-1, .page-2, .page-3, .emit-1, .emit-2, .emit-3, .raw-anim { animation: none; }
  }
</style>
