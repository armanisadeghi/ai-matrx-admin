<style>
  @keyframes split-line-1 { 0%, 18% { opacity: 0; transform: scaleY(0); } 22%, 100% { opacity: 1; transform: scaleY(1); } }
  @keyframes split-line-2 { 0%, 33% { opacity: 0; transform: scaleY(0); } 38%, 100% { opacity: 1; transform: scaleY(1); } }
  @keyframes split-line-3 { 0%, 48% { opacity: 0; transform: scaleY(0); } 53%, 100% { opacity: 1; transform: scaleY(1); } }
  @keyframes split-line-4 { 0%, 63% { opacity: 0; transform: scaleY(0); } 68%, 100% { opacity: 1; transform: scaleY(1); } }
  @keyframes chunk-fly-1 { 0%, 25% { opacity: 0; transform: translate(0,0); } 35% { opacity: 1; } 60%, 100% { opacity: 1; transform: translate(220px, -40px); } }
  @keyframes chunk-fly-2 { 0%, 40% { opacity: 0; transform: translate(0,0); } 50% { opacity: 1; } 75%, 100% { opacity: 1; transform: translate(220px, -10px); } }
  @keyframes chunk-fly-3 { 0%, 55% { opacity: 0; transform: translate(0,0); } 65% { opacity: 1; } 90%, 100% { opacity: 1; transform: translate(220px, 20px); } }
  @keyframes chunk-fly-4 { 0%, 70% { opacity: 0; transform: translate(0,0); } 80% { opacity: 1; } 95%, 100% { opacity: 1; transform: translate(220px, 50px); } }

  .split-1 { transform-origin: center; transform-box: fill-box; animation: split-line-1 6s ease-out infinite; }
  .split-2 { transform-origin: center; transform-box: fill-box; animation: split-line-2 6s ease-out infinite; }
  .split-3 { transform-origin: center; transform-box: fill-box; animation: split-line-3 6s ease-out infinite; }
  .split-4 { transform-origin: center; transform-box: fill-box; animation: split-line-4 6s ease-out infinite; }
  .fly-1 { transform-box: fill-box; animation: chunk-fly-1 6s ease-in-out infinite; }
  .fly-2 { transform-box: fill-box; animation: chunk-fly-2 6s ease-in-out infinite; }
  .fly-3 { transform-box: fill-box; animation: chunk-fly-3 6s ease-in-out infinite; }
  .fly-4 { transform-box: fill-box; animation: chunk-fly-4 6s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) {
    .split-1, .split-2, .split-3, .split-4, .fly-1, .fly-2, .fly-3, .fly-4 { animation: none; }
  }
</style>
<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Chunk step animation</title>
  <desc>Clean text is divided by split markers into small pieces, which fly off into a chunk store.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">Step 4: Chunk</text>
  <text class="ts" x="340" y="60" text-anchor="middle" dominant-baseline="central">Clean text → small overlapping pieces</text>

  <!-- Source: Clean text -->
  <g class="c-teal">
    <rect x="40" y="100" width="240" height="220" rx="10" stroke-width="0.5"/>
    <text class="ts" x="160" y="120" text-anchor="middle" dominant-baseline="central">Clean text</text>
  </g>

  <!-- Text lines (4 chunks worth) -->
  <!-- Chunk 1 lines -->
  <g class="fly-1">
    <rect x="50" y="138" width="220" height="40" rx="3" fill="#9FE1CB" opacity="0.18"/>
    <line x1="60" y1="148" x2="260" y2="148" stroke="#085041" stroke-width="0.8"/>
    <line x1="60" y1="158" x2="252" y2="158" stroke="#085041" stroke-width="0.8"/>
    <line x1="60" y1="168" x2="248" y2="168" stroke="#085041" stroke-width="0.8"/>
  </g>

  <line x1="50" y1="184" x2="270" y2="184" stroke="#1D9E75" stroke-width="2" stroke-dasharray="4 3" class="split-1"/>

  <g class="fly-2">
    <rect x="50" y="190" width="220" height="40" rx="3" fill="#9FE1CB" opacity="0.18"/>
    <line x1="60" y1="200" x2="262" y2="200" stroke="#085041" stroke-width="0.8"/>
    <line x1="60" y1="210" x2="256" y2="210" stroke="#085041" stroke-width="0.8"/>
    <line x1="60" y1="220" x2="244" y2="220" stroke="#085041" stroke-width="0.8"/>
  </g>

  <line x1="50" y1="236" x2="270" y2="236" stroke="#1D9E75" stroke-width="2" stroke-dasharray="4 3" class="split-2"/>

  <g class="fly-3">
    <rect x="50" y="242" width="220" height="34" rx="3" fill="#9FE1CB" opacity="0.18"/>
    <line x1="60" y1="252" x2="262" y2="252" stroke="#085041" stroke-width="0.8"/>
    <line x1="60" y1="262" x2="248" y2="262" stroke="#085041" stroke-width="0.8"/>
    <line x1="60" y1="272" x2="256" y2="272" stroke="#085041" stroke-width="0.8"/>
  </g>

  <line x1="50" y1="282" x2="270" y2="282" stroke="#1D9E75" stroke-width="2" stroke-dasharray="4 3" class="split-3"/>

  <g class="fly-4">
    <rect x="50" y="288" width="220" height="28" rx="3" fill="#9FE1CB" opacity="0.18"/>
    <line x1="60" y1="298" x2="252" y2="298" stroke="#085041" stroke-width="0.8"/>
    <line x1="60" y1="308" x2="244" y2="308" stroke="#085041" stroke-width="0.8"/>
  </g>

  <!-- Destination: Chunks bin -->
  <g class="c-purple">
    <rect x="400" y="100" width="240" height="220" rx="10" stroke-width="0.5"/>
    <text class="ts" x="520" y="120" text-anchor="middle" dominant-baseline="central">Chunks</text>
    <text class="ts" x="520" y="304" text-anchor="middle" dominant-baseline="central">Small overlapping pieces</text>
  </g>

  <!-- Connecting arrow visible behind flying chunks -->
  <line x1="280" y1="210" x2="396" y2="210" stroke="#888780" stroke-width="1" opacity="0.3" stroke-dasharray="4 4"/>
</svg>
